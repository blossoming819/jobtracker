services:
  mysql:
    image: mysql:8.0
    container_name: job-tracker-mysql
    restart: unless-stopped
    environment:
      MYSQL_ROOT_PASSWORD: ${MYSQL_ROOT_PASSWORD:?Set MYSQL_ROOT_PASSWORD in .env}
      MYSQL_DATABASE: job_tracker
      TZ: Asia/Shanghai
    volumes:
      - mysql_data:/var/lib/mysql
      - ./database/schema.sql:/docker-entrypoint-initdb.d/01-schema.sql:ro
    command:
      - --character-set-server=utf8mb4
      - --collation-server=utf8mb4_unicode_ci
    ports:
      - "${MYSQL_PORT:-3307}:3306"

  backend:
    build:
      context: ./backend
    container_name: job-tracker-backend
    restart: unless-stopped
    depends_on:
      - mysql
    environment:
      SPRING_DATASOURCE_URL: jdbc:mysql://mysql:3306/job_tracker?useUnicode=true&characterEncoding=utf8&serverTimezone=Asia/Shanghai&allowPublicKeyRetrieval=true&useSSL=false
      SPRING_DATASOURCE_USERNAME: root
      SPRING_DATASOURCE_PASSWORD: ${MYSQL_ROOT_PASSWORD:?Set MYSQL_ROOT_PASSWORD in .env}
      JOB_TRACKER_STORAGE_RESUME_DIR: /app/data/resumes
      JOB_TRACKER_STORAGE_NOTE_DIR: /app/data/interview_notes
      JOB_TRACKER_STORAGE_GENERAL_NOTE_DIR: /app/data/notes
      TZ: Asia/Shanghai
    volumes:
      - app_data:/app/data

  frontend:
    build:
      context: ./frontend
    container_name: job-tracker-frontend
    restart: unless-stopped
    depends_on:
      - backend
    ports:
      - "${FRONTEND_PORT:-5173}:80"

volumes:
  mysql_data:
  app_data:
